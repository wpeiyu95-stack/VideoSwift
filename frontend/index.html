<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoSwift - AI 视频速读与总结工具</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="badge">AI Video Summary Tool</div>

      <h1>VideoSwift</h1>

      <p class="subtitle">
        把冗长视频变成清晰摘要，让你用 3 分钟理解一小时内容。
      </p>

      <div class="input-card">
        <input
          id="videoInput"
          type="text"
          placeholder="请输入视频链接，例如：https://example.com/video"
        />

        <button id="summaryButton" onclick="generateSummary()">开始总结</button>
      </div>

      <div id="result" class="result-card hidden">
        <div id="analysisView" class="analysis-view hidden">
          <h2>正在分析视频</h2>
          <p class="analysis-desc">VideoSwift 正在模拟读取链接、提取字幕并生成摘要。</p>

          <ul class="analysis-list">
            <li id="step-1" class="analysis-step">正在读取视频链接</li>
            <li id="step-2" class="analysis-step">正在提取视频字幕</li>
            <li id="step-3" class="analysis-step">正在生成 AI 摘要</li>
            <li id="step-4" class="analysis-step">总结完成</li>
          </ul>
        </div>

        <div id="summaryView" class="summary-view hidden">
          <h2>视频总结</h2>
          <p>
            这是一个模拟总结结果。未来 VideoSwift 会自动获取视频字幕，并通过 AI
            生成核心观点、章节摘要和行动清单。
          </p>

          <ul>
            <li>核心观点：快速提取视频主要内容</li>
            <li>适用场景：课程学习、会议回看、知识整理</li>
            <li>下一步：接入真实 AI API 和视频字幕解析能力</li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <script>
  const analysisTimings = [250, 750, 1250, 1700];
  let isAnalyzing = false;
  let analysisTimers = [];

  function clearAnalysisTimers() {
    analysisTimers.forEach((timer) => clearTimeout(timer));
    analysisTimers = [];
  }

  function setStepActive(stepNumber) {
    const step = document.getElementById(`step-${stepNumber}`);
    if (step) {
      step.classList.add("is-active");
    }
  }

  function resetFlowState() {
    [1, 2, 3, 4].forEach((stepNumber) => {
      const step = document.getElementById(`step-${stepNumber}`);
      if (step) {
        step.classList.remove("is-active");
      }
    });
  }

  function showSummary() {
    const analysisView = document.getElementById("analysisView");
    const summaryView = document.getElementById("summaryView");
    const result = document.getElementById("result");
    const summaryButton = document.getElementById("summaryButton");

    analysisView.classList.add("hidden");
    summaryView.classList.remove("hidden");
    result.classList.remove("hidden");
    summaryButton.textContent = "开始总结";
    summaryButton.disabled = false;
    isAnalyzing = false;
    clearAnalysisTimers();
  }

  function generateSummary() {
    const input = document.getElementById("videoInput").value;
    const result = document.getElementById("result");
    const analysisView = document.getElementById("analysisView");
    const summaryView = document.getElementById("summaryView");
    const summaryButton = document.getElementById("summaryButton");

    if (isAnalyzing) {
      return;
    }

    if (!input.trim()) {
      alert("请先输入一个视频链接");
      return;
    }

    isAnalyzing = true;
    clearAnalysisTimers();
    resetFlowState();

    result.classList.remove("hidden");
    summaryView.classList.add("hidden");
    analysisView.classList.remove("hidden");
    summaryButton.textContent = "分析中...";
    summaryButton.disabled = true;

    analysisTimings.forEach((delay, index) => {
      const timer = setTimeout(() => {
        setStepActive(index + 1);
        if (index === analysisTimings.length - 1) {
          showSummary();
        }
      }, delay);

      analysisTimers.push(timer);
    });
  }
</script>
</body>
</html>
